    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #07100c;
        --fg:      #f0ede8;
        --accent:  #c8f04d;
        --muted:   rgba(240,237,232,.25);
        --radius:  6px;
        --font-display: "Syne", sans-serif;
        --font-serif:   "Cormorant", Georgia, serif;
        --font-ui:      "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
      }

      html {
        background: var(--bg);
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        overflow-x: hidden;
      }

      #root {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }

      /* ── Loading screen ─────────────────────────── */
      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        z-index: 9999;
        transition: opacity .5s ease, visibility .5s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loader .mark {
        font-family: "Syne", var(--font-ui);
        font-size: clamp(1.1rem, 3vw, 1.5rem);
        font-weight: 800;
        letter-spacing: .18em;
        text-transform: uppercase;
        color: var(--fg);
        opacity: 0;
        animation: fadeUp .6s .1s ease forwards;
      }
      #app-loader .mark span { color: var(--accent); }
      #app-loader .bar {
        margin-top: 1.75rem;
        width: clamp(80px, 20vw, 160px);
        height: 1px;
        background: rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
      }
      #app-loader .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.5);
        transform: translateX(-100%);
        animation: slide .9s .2s cubic-bezier(.4,0,.2,1) forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide { to { transform: translateX(0); } }

      ::-webkit-scrollbar              { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track        { background: transparent; }
      ::-webkit-scrollbar-thumb        { background: rgba(255,255,255,0.1); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover  { background: rgba(255,255,255,0.25); }

      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: var(--radius);
      }

      ::-moz-selection { background: var(--accent); color: var(--bg); }

      ::selection { background: var(--accent); color: var(--bg); }
    </style>

    <noscript>
      <style>#app-loader { display: none; } body { font-family: monospace; padding: 2rem; }</style>
      <p>Ce portfolio nécessite JavaScript. Veuillez l'activer dans les paramètres de votre navigateur.</p>
    </noscript>

    <script>
      (function () {
        var loader = document.getElementById('app-loader');
        if (!loader) return;
        var firstVisit = !sessionStorage.getItem('seenLoader');
        var minDelay = firstVisit ? 4200 : 0;
        var start = Date.now();
        var observer = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            if (mutations[i].addedNodes.length) {
              var elapsed = Date.now() - start;
              var wait = Math.max(0, minDelay - elapsed);
              setTimeout(function () {
                loader.classList.add('hidden');
                observer.disconnect();
                loader.addEventListener('transitionend', function () { loader.remove(); }, { once: true });
                if (firstVisit) sessionStorage.setItem('seenLoader', '1');
              }, wait);
              break;
            }
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
        setTimeout(function () { loader.classList.add('hidden'); observer.disconnect(); }, 4000);
      })();
    </script>
