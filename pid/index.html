    <!-- ═══════════════════════════════════════════════
         PERFORMANCE — MODULE PRELOAD

    <!-- ═══════════════════════════════════════════════
         CRITICAL CSS — NO FLASH, NO LAYOUT SHIFT
         Rendered before any JS, ensures:
           • background colour matches theme-color
           • loading screen appears instantly
           • body hidden until React hydrates
    ═══════════════════════════════════════════════ -->
    <style>
      /* ── Reset & root tokens ─────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg:      #0a0a0f;
        --fg:      #f0ede8;
        --accent:  #c8f04d;
        --muted:   rgba(240,237,232,.35);
        --radius:  6px;
        --font-ui: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;
      }

      html {
        background: var(--bg);
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        font-family: var(--font-ui);
        background: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        overflow-x: hidden;
      }

      /* ── #root: full viewport by default ────────── */
      #root {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        isolation: isolate;
      }

      /* ── Loading screen (removed once React mounts) */
      #app-loader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: var(--bg);
        z-index: 9999;
        transition: opacity .4s ease, visibility .4s ease;
      }
      #app-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loader .mark {
        font-family: var(--font-ui);
        font-size: clamp(1.1rem, 3vw, 1.5rem);
        letter-spacing: .25em;
        text-transform: uppercase;
        color: var(--fg);
        opacity: 0;
        animation: fadeUp .6s .1s ease forwards;
      }
      #app-loader .mark span {
        color: var(--accent);
      }
      #app-loader .bar {
        margin-top: 2rem;
        width: clamp(80px, 20vw, 160px);
        height: 1px;
        background: var(--muted);
        position: relative;
        overflow: hidden;
      }
      #app-loader .bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: var(--accent);
        transform: translateX(-100%);
        animation: slide .9s .2s cubic-bezier(.4,0,.2,1) forwards;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide {
        to { transform: translateX(0); }
      }

      /* ── Scrollbar — themed ──────────────────────── */
      ::-webkit-scrollbar              { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track        { background: transparent; }
      ::-webkit-scrollbar-thumb        { background: var(--muted); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover  { background: var(--accent); }

      /* ── Focus-visible ring ──────────────────────── */
      :focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: var(--radius);
      }

      /* ── Selection ───────────────────────────────── */
      ::selection {
        background: var(--accent);
        color: var(--bg);
      }
    </style>
  </head>

  <body>

    <!-- ─────────────────────────────────────────────
         INSTANT LOADING SCREEN
         Visible on first paint; React removes it
         via JS once the app is ready to render.
    ───────────────────────────────────────────── -->
    <div id="app-loader" role="status" aria-label="Loading application">
      <div>
        <p class="mark">Ibrahima Baby</p>
        <div class="bar" aria-hidden="true"></div>
      </div>
    </div>

    <!-- ─────────────────────────────────────────────
         REACT MOUNT POINT
    ───────────────────────────────────────────── -->
    <div id="root"></div>

    <!-- ─────────────────────────────────────────────
         NO-SCRIPT FALLBACK
    ───────────────────────────────────────────── -->
    <noscript>
      <style>
        #app-loader { display: none; }
        body { font-family: monospace; padding: 2rem; }
      </style>
      <p>This application requires JavaScript. Please enable it in your browser settings.</p>
    </noscript>

    <!-- ─────────────────────────────────────────────
         LOADER DISMISSAL SCRIPT (inline, ~200 bytes)
         Removes the loading screen the moment React
         calls ReactDOM.createRoot().render().
         Works by observing #root for child additions.
    ───────────────────────────────────────────── -->
    <script>
      (function () {
        var loader = document.getElementById('app-loader');
        if (!loader) return;

        var observer = new MutationObserver(function (mutations) {
          for (var i = 0; i < mutations.length; i++) {
            if (mutations[i].addedNodes.length) {
              loader.classList.add('hidden');
              observer.disconnect();
              // clean up from DOM after transition
              loader.addEventListener('transitionend', function () {
                loader.remove();
              }, { once: true });
              break;
            }
          }
        });

        observer.observe(document.getElementById('root'), { childList: true });

        // Hard fallback: kill loader after 6 s regardless
        setTimeout(function () {
          loader.classList.add('hidden');
          observer.disconnect();
        }, 6000);
      })();
    </script>

    <!-- ─────────────────────────────────────────────
         APP ENTRY — Vite / React
    ───────────────────────────────────────────── -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
